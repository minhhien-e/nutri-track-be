services:
  postgres:
    image: postgres:16-alpine
    container_name: nutri-track-postgres
    environment:
      POSTGRES_USER: nutri
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nutri_track
    ports:
      - "5432:5432"
    volumes:
      - nutri_track_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutri -d nutri_track"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: nutri-track-api
    env_file:
      - .env.example
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nutri_track_pg_data:
